Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' http: https: ws: wss:; font-src 'self' data:; frame-ancestors 'none'; img-src 'self' data: blob: http: https:; media-src 'self' data: blob: http: https:; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self'; worker-src 'self' blob:"
