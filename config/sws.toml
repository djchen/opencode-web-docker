[general]
host = "0.0.0.0"
port = 80
root = "/home/sws/public"
page-fallback = "/home/sws/public/index.html"
cache-control-headers = true

[[advanced.headers]]
source = "/runtime-config.js"

[advanced.headers.headers]
Cache-Control = "no-store, no-cache, must-revalidate"

[[advanced.headers]]
source = "/index.html"

[advanced.headers.headers]
