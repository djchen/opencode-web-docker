services:
  web:
    image: ghcr.io/djchen/opencode-web-docker
    ports:
      - 8080:80
    environment:
      OPENCODE_SERVER_URL: https://opencode-api1.example.com
      OPENCODE_SERVER_NAME: Server 1
      # Optional: enable settings sync
      # OPENCODE_SETTINGS_SYNC_URL: https://sync.example.com/v1/sync/users/opencode/settings
      # OPENCODE_SETTINGS_SYNC_INTERVAL: 30
      # OPENCODE_SETTINGS_SYNC_AUTH_HEADER: "Bearer my-token"